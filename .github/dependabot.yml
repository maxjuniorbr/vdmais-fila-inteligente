version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Título no formato do projeto: `chore: bump ...` (type válido, sem escopo).
    # O Dependabot ainda anexa um body (changelog); ao mesclar por squash, limpe
    # o body para o commit final ficar conforme (linha única, sem corpo).
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    groups:
      # Prisma CLI and client must move together (same major/minor), otherwise
      # `prisma generate` fails on a version mismatch. Routine patches only.
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@prisma/*"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "prisma"
    ignore:
      # Prisma 7 is a major with breaking changes (generator output, removed
      # flags, ESM). Upgrade deliberately in a dedicated PR, not via Dependabot.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      github-actions:
        patterns:
          - "*"
