version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Título no formato do projeto: `chore: bump ...` (type válido, sem escopo).
    # Os PRs do bot NÃO são mesclados (o commit deles tem body/changelog e o
    # título pode passar de 72 chars): porta-se o bump manualmente para master
    # via /commit (agente dependency-updater), que passa pelo hook commit-msg.
    # Após o push o Dependabot detecta a versão atualizada e fecha o PR sozinho.
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    groups:
      # Prisma CLI and client must move together (same major/minor), otherwise
      # `prisma generate` fails on a version mismatch. Routine patches only.
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@prisma/*"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "prisma"
    ignore:
      # Prisma 7 is a major with breaking changes (generator output, removed
      # flags, ESM). Upgrade deliberately in a dedicated PR, not via Dependabot.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      # React is pinned to the 18 line per DT-16 in docs/debitos-tecnicos.md.
      # Do not propose the major back to 19.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      github-actions:
        patterns:
          - "*"
