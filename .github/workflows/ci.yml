name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fila
          POSTGRES_PASSWORD: fila_dev_pass
          POSTGRES_DB: fila_inteligente
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm exec --workspace=apps/backend prisma generate

      - name: Run Prisma migrations
        run: npm exec --workspace=apps/backend prisma migrate deploy
        env:
          DATABASE_URL: postgresql://fila:fila_dev_pass@localhost:5432/fila_inteligente

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Backend tests with coverage
        run: npm run test:cov --workspace=apps/backend -- --watchman=false --runInBand
        env:
          DATABASE_URL: postgresql://fila:fila_dev_pass@localhost:5432/fila_inteligente
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          JWT_EXPIRES_IN: 7d

      - name: Frontend tests with coverage
        run: npm run test:cov --workspace=apps/frontend

      - name: New code coverage gate
        env:
          COVERAGE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          git diff --unified=0 --diff-filter=ACMR "$COVERAGE_BASE" -- apps/backend/src apps/frontend/src |
            npm run coverage:changed -- --base-label "$COVERAGE_BASE"

      - name: End-to-end tests
        run: npm run test:e2e --workspace=apps/backend -- --watchman=false --runInBand
        env:
          DATABASE_URL: postgresql://fila:fila_dev_pass@localhost:5432/fila_inteligente
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          JWT_EXPIRES_IN: 7d

      - name: Install browser for frontend E2E
        run: npx playwright install --with-deps chromium

      - name: Frontend browser E2E
        run: npm run test:e2e --workspace=apps/frontend
        env:
          CI: true

      - name: Dependency audit
        run: npm audit --audit-level=high
