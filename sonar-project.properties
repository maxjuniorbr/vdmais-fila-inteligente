# ── SonarQube Local – VDMais Fila Inteligente ────────────────────
sonar.projectKey=vdmais-fila-inteligente
sonar.projectName=VDMais Fila Inteligente
sonar.projectVersion=1.0.0

# ── Fontes (monorepo) ───────────────────────────────────────────
sonar.sources=apps/backend/src,apps/frontend/src
sonar.tests=apps/backend/src
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

# ── Exclusões ────────────────────────────────────────────────────
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/prisma/migrations/**

# ── TypeScript / JavaScript ──────────────────────────────────────
sonar.typescript.lcov.reportPaths=apps/backend/coverage/lcov.info,apps/frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=apps/backend/coverage/lcov.info,apps/frontend/coverage/lcov.info

# ── Encoding ─────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Server local ─────────────────────────────────────────────────
sonar.host.url=http://localhost:9000
